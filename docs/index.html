<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Convert between Pascal, bar, psi, atm, mmHg"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y=".9em" font-size='90'>🛠</text></svg>">
<title>Pressure Converter — DevKit Tools</title><style>:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--accent:#58a6ff;}*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px;}.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:400px;width:100%;}h1{font-size:20px;color:#f0f6fc;margin-bottom:20px;text-align:center;}input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-size:20px;text-align:center;margin-bottom:12px;}input:focus{outline:none;border-color:var(--accent);}select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:14px;margin-bottom:12px;}.results{display:grid;gap:6px;}.r{display:flex;justify-content:space-between;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:13px;}.r .val{color:var(--accent);font-weight:600;}*:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}::selection{background:rgba(88,166,255,0.3);color:#fff}</style></head><body><div class="card"><h1>💨 Pressure</h1><input type="number" id="val" value="1" oninput="conv()"><select id="from" onchange="conv()"><option value="pa">Pascal</option><option value="bar" selected>Bar</option><option value="psi">PSI</option><option value="atm">Atmosphere</option><option value="mmhg">mmHg</option></select><div class="results" id="results"></div></div><script>
'use strict';const toPa={pa:1,bar:100000,psi:6894.76,atm:101325,mmhg:133.322};const units=Object.keys(toPa);function conv(){const v=parseFloat(document.getElementById('val').value)||0;const pa=v*toPa[document.getElementById('from').value];document.getElementById('results').innerHTML=units.filter(u=>u!==document.getElementById('from').value).map(u=>'<div class="r"><span>'+u+'</span><span class="val">'+(pa/toPa[u]).toFixed(4)+'</span></div>').join('')}conv();</script></body></html>
